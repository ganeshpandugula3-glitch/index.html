<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Calculator</title>
    <style>
        /* CSS - Design kosam */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #000;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        #display {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
            background: #333;
            color: #00FF00; /* Hacker Green color */
            border: none;
            border-radius: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background-color: #666;
        }

        .operator {
            background-color: #f39c12;
        }

        .equal {
            background-color: #27ae60;
            grid-column: span 2;
        }

        .clear {
            background-color: #c0392b;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Input screen -->
        <input type="text" id="display" disabled>
        
        <!-- Buttons -->
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="addToDisplay('/')">/</button>
            <button class="operator" onclick="addToDisplay('*')">*</button>
            
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="operator" onclick="addToDisplay('-')">-</button>
            
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="operator" onclick="addToDisplay('+')">+</button>
            
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            
            <button class="equal" onclick="calculate()">=</button>
            <button onclick="addToDisplay('0')">0</button>
            <button onclick="addToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        /* JavaScript - Logic kosam */
        let display = document.getElementById('display');

        // Screen meeda numbers add cheyadaniki
        function addToDisplay(value) {
            display.value += value;
        }

        // Screen clean cheyadaniki
        function clearDisplay() {
            display.value = "";
        }

        // Calculation chesi result chupinchadaniki
        function calculate() {
            try {
                // eval() ane function math logic ni solve chestundi
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
